<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  background: #020617;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  position: relative;
  width: 400px;
  height: 200px;
}

.dot {
  position: absolute;
  width: 24px;
  height: 24px;
  background: #f59e0b;
  border-radius: 50%;
  filter: blur(2px);
  transition: all 0.8s ease;
}

.left { left: 80px; top: 90px; }
.right { right: 80px; top: 90px; }

.line {
  position: absolute;
  left: 50%;
  top: 102px;
  width: 0;
  height: 2px;
  background: #f59e0b;
  transform: translateX(-50%);
  transition: width 0.6s ease;
}

.center {
  position: absolute;
  left: 50%;
  top: 90px;
  width: 0;
  height: 0;
  background: #f59e0b;
  border-radius: 50%;
  transform: translateX(-50%);
  opacity: 0;
  transition: all 0.6s ease;
}
</style>
</head>

<body>

<div class="container">
  <div class="dot left"></div>
  <div class="dot right"></div>
  <div class="line"></div>
  <div class="center"></div>
</div>

<script>
const left = document.querySelector('.left');
const right = document.querySelector('.right');
const line = document.querySelector('.line');
const center = document.querySelector('.center');

setTimeout(() => {
  line.style.width = "160px";
}, 800);

setTimeout(() => {
  left.style.left = "190px";
  right.style.right = "190px";
}, 1400);

setTimeout(() => {
  line.style.height = "60px";
  line.style.width = "2px";
}, 2000);

setTimeout(() => {
  left.style.opacity = 0;
  right.style.opacity = 0;
  line.style.opacity = 0;

  center.style.width = "26px";
  center.style.height = "26px";
  center.style.opacity = 1;
}, 2600);
</script>

</body>
</html>
